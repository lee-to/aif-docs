name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Bun availability
        id: bun-check
        shell: bash
        run: |
          if command -v bun >/dev/null 2>&1; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(bun --version)" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bun (if missing)
        if: steps.bun-check.outputs.installed == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        shell: bash
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            echo "bun is not available" >&2
            exit 1
          fi

          echo "Using bun $(bun --version)"

      - name: Validate deploy secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          missing=0
          for key in DEPLOY_HOST DEPLOY_PATH DEPLOY_USER SSH_PRIVATE_KEY; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: ${key}" >&2
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate static site
        run: bunx nuxi generate

      - name: Verify generated output
        shell: bash
        run: |
          test -d dist
          test -f dist/index.html

      - name: Prepare SSH
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Sync dist to server
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${DEPLOY_PATH}'"
          rsync -az --delete dist/ "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/"
