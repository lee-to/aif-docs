name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Bun availability
        id: bun-check
        shell: bash
        run: |
          if command -v bun >/dev/null 2>&1; then
            echo "installed=true" >> "$GITHUB_OUTPUT"
            echo "version=$(bun --version)" >> "$GITHUB_OUTPUT"
          else
            echo "installed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Bun (if missing)
        if: steps.bun-check.outputs.installed == 'false'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify Bun
        shell: bash
        run: |
          if ! command -v bun >/dev/null 2>&1; then
            echo "bun is not available" >&2
            exit 1
          fi

          echo "Using bun $(bun --version)"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build
